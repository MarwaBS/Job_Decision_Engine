# Dependabot configuration for Job Decision Engine.
#
# Three ecosystems monitored — same hygiene pattern as the rest of the
# portfolio (nyc-real-estate-predictor, high-pay-salary-predictor,
# ResumeForge). Dependabot opens weekly PRs for outdated or
# CVE-affected dependencies; nothing auto-merges.
#
# - pip            -> requirements.txt (production runtime + test deps)
# - github-actions -> versions in .github/workflows/*.yml
# - docker         -> base image in Dockerfile
#
# Config reference:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
